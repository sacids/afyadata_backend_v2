{% extends 'layouts/base.html' %}
{% load static %}
{% load humanize %}

{% block extra-css %}
<style>
    #datatable_clinical_signs_wrapper .dataTables_filter {
        display: none !important;
    }

    #datatable_clinical_signs thead tr:nth-child(2) {
        display: none !important;
    }

    #datatable_clinical_signs thead input,
    #datatable_clinical_signs thead select {
        display: none !important;
    }
</style>
{% endblock extra-css %}

{% block content %}

<main class="bg-white h-full" x-data="initData()">
    <div class="mx-auto max-w-7xl py-6 px-4 sm:px-6 lg:px-8">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="border-b border-gray-200 bg-gray-50/70 px-5 py-4">
                <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
                    <div>
                        <h2 class="text-sm font-semibold text-gray-800">Clinical Signs</h2>
                        <p class="text-xs text-gray-500">
                            Search mapped clinical signs, review codes, and refresh the latest source data.
                        </p>
                    </div>

                    <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
                        <div class="relative min-w-[260px]">
                            <i class='bx bx-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400'></i>
                            <input id="clinical_sign_search" type="text" placeholder="Search clinical signs or source..."
                                class="w-full rounded-md border border-gray-300 bg-white pl-9 pr-3 py-2 text-sm text-gray-700 placeholder:text-gray-400 focus:border-slate-500 focus:ring-slate-500">
                        </div>

                        <button id="clinical_signs_export" type="button"
                            class="inline-flex items-center justify-center rounded-md border border-green-700 bg-green-700 px-2 py-2 text-xs font-normal text-white hover:bg-green-800">
                            <i class='bx bxs-file-export mr-2'></i> Export CSV
                        </button>

                        <button type="button" x-html="btnSync" x-on:click="syncData();"
                            class="inline-flex items-center rounded-md bg-slate-700 px-2 py-2 text-xs font-normal text-white hover:bg-slate-800">
                        </button>
                    </div>
                </div>
            </div>

            <div class="p-4">
                <div class="relative overflow-x-auto">
                    <div id="message_wrp" class="mb-3" hx-preserve></div>

                    <table id="datatable_clinical_signs" class="w-full text-xs text-left text-gray-700 border-collapse">
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

{% endblock %}

{% block extra-js %}

<script language="javascript">
    $(document).ready(function () {
        AjaxDatatableViewUtils.initialize_table(
            $('#datatable_clinical_signs'),
            "{% url 'ohkr:dt-clinical-signs' %}",
            {
                processing: false,
                autoWidth: false,
                scrollX: false,
                dom: `
                    <"flex justify-between items-center py-3 text-sm"
                        <"flex gap-2 items-center">
                        <"flex items-center"p>
                    >
                    t
                `,
                buttons: [{
                    extend: 'csvHtml5',
                    text: 'Export',
                    filename: 'OHKR-Clinical-Signs-csv',
                    className: 'buttons-csv hidden'
                }],
                pageLength: 13,
                responsive: false,
                language: {
                    search: "",
                    info: "_PAGE_ of _PAGES_",
                    emptyTable: "No clinical signs found.",
                },
            }, {
        },);

        $('#clinical_sign_search').on('keyup', function () {
            $('#datatable_clinical_signs').DataTable().search(this.value).draw();
        });

        $('#clinical_signs_export').on('click', function () {
            $('#datatable_clinical_signs').DataTable().button('.buttons-csv').trigger();
        });
    });

    function initData() {
        return {
            formLoading: false,
            btnSync: "<i class='bx bxs-cloud-download px-1'></i> Sync Data",

            showMessage(type, message) {
                const styles = {
                    success: "bg-green-100 border border-green-100 text-green-800 text-sm",
                    danger: "bg-red-100 border border-red-100 text-red-800 text-sm"
                };

                $('#message_wrp').html(
                    `<div class="${styles[type]} px-4 py-3 rounded-sm">${message}</div>`
                );
            },

            async syncData() {
                this.formLoading = true;
                this.btnSync = "<i class='bx bx-loader-circle bx-spin'></i> Syncing data....";

                fetch(`/ohkr/clinical-signs/sync`)
                    .then(response => response.json())
                    .then(data => {
                        if (data.success === true) {
                            this.showMessage('success', data.success_msg);
                            setTimeout(() => window.location.reload(), 3000);
                        } else if (data.success == false) {
                            this.showMessage('danger', data.error_msg)
                        }
                    }).catch(error => {
                        console.error("Error caught:", error);
                        this.showMessage('danger', "Failed to sync clinical signs.");
                    }).finally(() => {
                        this.formLoading = false;
                        this.btnSync = "<i class='bx bxs-cloud-download px-1'></i> Sync Data";
                    });
            },
        }
    }

</script>
{% endblock extra-js %}
