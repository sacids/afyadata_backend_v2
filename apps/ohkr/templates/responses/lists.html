{% extends 'layouts/base.html' %}
{% load static %}
{% load humanize %}

{% block extra-css %}
<style>
    #datatable_responses_wrapper .dataTables_filter {
        display: none !important;
    }

    #datatable_responses thead tr:nth-child(2) {
        display: none !important;
    }

    #datatable_responses thead input,
    #datatable_responses thead select {
        display: none !important;
    }
</style>
{% endblock extra-css %}

{% block content %}

<main class="bg-white h-full">
    <div class="mx-auto max-w-7xl py-6 px-4 sm:px-6 lg:px-8">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
            <div class="border-b border-gray-200 bg-gray-50/70 px-5 py-4">
                <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
                    <div>
                        <h2 class="text-sm font-semibold text-gray-800">Response Messages</h2>
                        <p class="text-xs text-gray-500">
                            Search reusable response messages and export the current reference list.
                        </p>
                    </div>

                    <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
                        <div class="relative min-w-[260px]">
                            <i class='bx bx-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400'></i>
                            <input id="response_search" type="text" placeholder="Search response messages..."
                                class="w-full rounded-md border border-gray-300 bg-white pl-9 pr-3 py-2 text-sm text-gray-700 placeholder:text-gray-400 focus:border-slate-500 focus:ring-slate-500">
                        </div>

                        <button id="responses_export"
                            class="inline-flex items-center justify-center rounded-md border border-green-700 bg-green-700 px-2 py-2 text-xs font-normal text-white hover:bg-green-800">
                            <i class='bx bxs-file-export mr-2'></i> Export CSV
                        </button>
                    </div>
                </div>
            </div>

            <div class="p-4">
                <div class="relative overflow-x-auto">
                    <div id="message_wrp" class="mb-3" hx-preserve></div>

                    <table id="datatable_responses" class="w-full text-xs text-left text-gray-700 border-collapse">
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

{% endblock %}

{% block extra-js %}

<script language="javascript">
    $(document).ready(function () {
        AjaxDatatableViewUtils.initialize_table(
            $('#datatable_responses'),
            "{% url 'ohkr:dt-responses' %}",
            {
                processing: false,
                autoWidth: false,
                scrollX: false,
                dom: `
                    <"flex justify-between items-center py-3 text-sm"
                        <"flex gap-2 items-center">
                        <"flex items-center"p>
                    >
                    t
                `,
                buttons: [
                    {
                        extend: 'csvHtml5',
                        text: 'Export',
                        filename: 'OHKR-Responses-csv',
                        className: 'buttons-csv hidden'
                    }
                ],
                pageLength: 13,
                responsive: false,
                language: {
                    search: "",
                    info: "_PAGE_ of _PAGES_",
                    emptyTable: "No response messages found.",
                },
            }, {
        },);

        $('#response_search').on('keyup', function () {
            $('#datatable_responses').DataTable().search(this.value).draw();
        });

        $('#responses_export').on('click', function () {
            $('#datatable_responses').DataTable().button('.buttons-csv').trigger();
        });
    });

</script>
{% endblock extra-js %}
