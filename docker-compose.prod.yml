services:
  db:
    image: postgres:16-alpine
    container_name: afyadata-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: afyadata-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENGINE: ${ENGINE:-django.db.backends.postgresql}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOST: ${ALLOWED_HOST}
      AFYADATA_HUB_URL: ${AFYADATA_HUB_URL}
      AFYADATA_HUB_API_KEY: ${AFYADATA_HUB_API_KEY}
      AFYADATA_GLOBAL_KEY: ${AFYADATA_GLOBAL_KEY}
      CURRENT_INSTANCE_EXTERNAL_URL: ${CURRENT_INSTANCE_EXTERNAL_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://127.0.0.1:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://127.0.0.1:6379/0}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    expose:
      - "8000"
    volumes:
      - static_data:/app/static
      - media_data:/app/media

  nginx:
    image: nginx:1.27-alpine
    container_name: afyadata-nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-_}
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/templates/default.conf.template:ro
      - static_data:/app/static:ro
      - media_data:/app/media:ro

volumes:
  postgres_data:
  static_data:
  media_data:
